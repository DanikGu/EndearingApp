name: Deploy via SSH

on:
  push:
    branches:
      - master 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: SSH and run commands
        env:
          PRIVATE_KEY: ${{ secrets.ARTIFACT_SSH_KEY }} 
        run: |
          echo "$PRIVATE_KEY" | tr -d '\r' > private_key.pem
          chmod 600 private_key.pem
          ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.USER }}@${{ secrets.HOST }} <<EOF
            cd ~/${{secrets.APP_PATH}}
            git pull origin master
            podman compose down -v
            podman compose pull
            podman compose up --build --force-recreate --detach
          EOF
          rm -f private_key.pem
    permissions:
      contents: read
      actions: write
      id-token: write
